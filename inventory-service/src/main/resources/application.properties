spring.application.name=inventory-service

server.port=8082

spring.datasource.url=jdbc:h2:mem:inventorydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# Kafka Configuration- for consumer
# Bootstrap servers
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=inventory-group

# Production Error Handling Deserializer setup
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

# Delegate the actual parsing to the JsonDeserializer after safety checks pass
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

# Trust and Type Mapping configurations
# Consumer Mapping (Incoming)
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.type.mapping=orderPlacedEvent:com.siddharth.inventory_service.dto.OrderPlacedEvent



# Outbound Producer Serializers for Inventory Service
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
# Producer Mapping (Outgoing)
spring.kafka.producer.properties.spring.json.type.mapping=inventoryProcessedEvent:com.siddharth.inventory_service.dto.InventoryProcessedEvent

# Tracing Configuration
# 1.0 means sample 100% of requests (Production usually uses 0.1 / 10% to save disk space)
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans